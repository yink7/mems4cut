<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mems4cut</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      background: #1a0000 url('bg.gif') center center / cover no-repeat scroll;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 0; pointer-events: none;
    }

    .screen {
      display: none; position: relative; z-index: 1;
      width: 100%; max-width: 540px;
      flex-direction: column; align-items: center; gap: 20px;
    }
    .screen.active { display: flex; }

    /* ══ 시작 화면 ══ */
    #s-start { justify-content: center; min-height: 80vh; gap: 32px; }

    .logo-wrap { position: relative; display: flex; justify-content: center; }
    .logo-img {
      width: 80%; max-width: 360px;
      opacity: 0;
      filter: drop-shadow(0 4px 24px rgba(255,100,150,.6));
    }
    /* 등장 전 pulse 루프는 등장 후 별도 클래스로 */
    .logo-img.pulse {
      animation: logoPulse 2.5s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { filter: drop-shadow(0 4px 24px rgba(255,100,150,.6)); }
      50%      { filter: drop-shadow(0 8px 40px rgba(255,160,210,1)); }
    }

    /* 로고 등장 애니메이션 */
    .logo-img.enter {
      animation: logoEntrance 1.4s cubic-bezier(.17,.89,.32,1.28) forwards;
    }
    @keyframes logoEntrance {
      0%   { opacity:0; transform: scale(0.05) rotate(-25deg); filter: blur(16px) brightness(4); }
      30%  { opacity:1; filter: blur(2px) brightness(2.5); }
      55%  { transform: scale(1.18) rotate(4deg); filter: blur(0) brightness(1.4); }
      72%  { transform: scale(0.94) rotate(-2deg); filter: brightness(1.1); }
      86%  { transform: scale(1.05) rotate(1deg); }
      100% { opacity:1; transform: scale(1) rotate(0deg); filter: drop-shadow(0 4px 24px rgba(255,100,150,.6)); }
    }

    /* 로고 주변 글로우 링 */
    .logo-glow {
      position: absolute; inset: -24px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,60,140,.35) 0%, transparent 70%);
      opacity: 0;
      transform: scale(0.2);
      pointer-events: none;
    }
    .logo-glow.burst {
      animation: glowBurst 1s ease-out forwards;
    }
    @keyframes glowBurst {
      0%   { opacity: 0; transform: scale(0.2); }
      30%  { opacity: 1; transform: scale(1.6); }
      100% { opacity: 0; transform: scale(2.2); }
    }

    .start-btn {
      padding: 16px 56px;
      background: linear-gradient(135deg, #c0006a, #ff4da6);
      color: white; border: none; border-radius: 50px;
      font-size: 18px; font-weight: 800; letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,60,140,.5);
      transition: transform .15s, box-shadow .15s;
      opacity: 0; animation: fadeUp .6s 1.6s ease-out forwards;
    }
    .start-btn:hover { transform: scale(1.04); box-shadow: 0 6px 28px rgba(255,60,140,.7); }
    .start-btn:active { transform: scale(.97); }

    /* ══ 카메라 화면 ══ */
    .cam-outer {
      width: 100%; background: #000; border-radius: 16px;
      overflow: hidden; position: relative;
      box-shadow: 0 0 30px rgba(255,60,140,.35);
    }
    #compositeCanvas { width: 100%; display: block; }
    #cdOverlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 110px; font-weight: 900; color: white;
      text-shadow: 0 2px 24px rgba(255,60,140,.9);
      pointer-events: none; opacity: 0; transition: opacity .12s;
    }
    #cdOverlay.show { opacity: 1; }

    .frame-strip { display: flex; gap: 10px; justify-content: center; }
    .frame-dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: rgba(255,255,255,.3); transition: all .2s;
    }
    .frame-dot.done   { background: #ff4da6; }
    .frame-dot.active { background: white; box-shadow: 0 0 8px #fff; }

    .thumbs { display: flex; gap: 8px; justify-content: center; }
    .thumb {
      width: 64px; height: 48px; border-radius: 7px;
      background: rgba(255,255,255,.1); overflow: hidden;
      border: 2px dashed rgba(255,255,255,.3); flex-shrink: 0;
    }
    .thumb.taken { border: 2px solid #ff4da6; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg,#c0006a,#ff4da6);
      color: white; border-radius: 50px; padding: 4px 16px;
      font-size: 13px; font-weight: 700;
    }
    .cam-label { color: rgba(255,255,255,.75); font-size: 13px; text-align: center; }

    /* ══ 결과 화면 ══ */
    .result-title {
      color: white; font-size: 20px; font-weight: 800;
      text-shadow: 0 2px 12px rgba(255,60,140,.8); text-align: center;
      opacity: 0; animation: fadeUp .7s .2s ease-out forwards;
    }
    .strip-wrap { width: 100%; display: flex; justify-content: center; position: relative; }
    #stripCanvas {
      max-width: 100%; border-radius: 10px;
      box-shadow: 0 4px 32px rgba(255,60,140,.4);
      opacity: 0; position: relative; z-index: 1;
    }
    #stripCanvas.reveal {
      animation: stripReveal 1.2s cubic-bezier(.17,.89,.32,1.28) forwards;
    }
    @keyframes stripReveal {
      0%   { opacity:0; transform: scale(.2) rotate(-20deg); filter: blur(16px); }
      50%  { opacity:1; transform: scale(1.09) rotate(3deg); filter: blur(0); }
      70%  { transform: scale(.96) rotate(-1.5deg); }
      85%  { transform: scale(1.03) rotate(.8deg); }
      100% { opacity:1; transform: scale(1) rotate(0); filter: none; }
    }

    /* 결과 GIF 오버레이 — screen blend로 검정 영역 투명 */
    #resultGif {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 200;
      mix-blend-mode: screen;
      opacity: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    #resultGif img {
      width: 100%; height: 100%; object-fit: cover;
    }
    #resultGif.show {
      animation: gifOverlay 3.5s ease-in-out forwards;
    }
    @keyframes gifOverlay {
      0%   { opacity: 0; transform: scale(1.3); }
      15%  { opacity: 1; transform: scale(1); }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* 파티클 캔버스 */
    #sparkleCanvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 999;
    }

    .btn {
      padding: 12px 32px; border: none; border-radius: 50px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s;
    }
    .btn-pink {
      background: linear-gradient(135deg,#c0006a,#ff4da6); color: white;
      box-shadow: 0 3px 14px rgba(255,60,140,.5);
    }
    .btn-pink:hover { opacity:.88; }
    .btn-outline {
      background: rgba(255,255,255,.12); color: white;
      border: 1.5px solid rgba(255,255,255,.5);
    }
    .btn-outline:hover { background: rgba(255,255,255,.22); }
    .btn-row {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
      opacity: 0; animation: fadeUp .6s 1s ease-out forwards;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes flashFade { from { opacity:.9 } to { opacity:0 } }
  </style>
</head>
<body>

<!-- 파티클 -->
<canvas id="sparkleCanvas"></canvas>

<!-- 결과 GIF 오버레이 -->
<div id="resultGif">
  <img src="done.gif" alt="" />
</div>

<!-- 시작 화면 -->
<div id="s-start" class="screen active">
  <div class="logo-wrap">
    <div class="logo-glow" id="logoGlow"></div>
    <img src="logo.webp" class="logo-img" id="logoImg" alt="꽃보다 남자" />
  </div>
  <button class="start-btn" onclick="startShooting()">촬영하기</button>
</div>

<!-- 카메라 화면 -->
<div id="s-camera" class="screen">
  <p class="cam-label"><span class="badge" id="cntBadge">1 / 4</span></p>
  <div class="cam-outer">
    <canvas id="compositeCanvas" width="640" height="480"></canvas>
    <div id="cdOverlay"></div>
  </div>
  <div class="frame-strip">
    <div class="frame-dot active" id="dot0"></div>
    <div class="frame-dot" id="dot1"></div>
    <div class="frame-dot" id="dot2"></div>
    <div class="frame-dot" id="dot3"></div>
  </div>
  <div class="thumbs">
    <div class="thumb" id="th0"></div>
    <div class="thumb" id="th1"></div>
    <div class="thumb" id="th2"></div>
    <div class="thumb" id="th3"></div>
  </div>
</div>

<!-- 결과 화면 -->
<div id="s-result" class="screen">
  <p class="result-title">인생네컷 완성! 🌹</p>
  <div class="strip-wrap">
    <canvas id="stripCanvas"></canvas>
  </div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="retake()">← 다시 찍기</button>
    <button class="btn btn-pink"    onclick="downloadStrip()">📥 저장하기</button>
  </div>
</div>

<video id="hiddenVideo" playsinline autoplay muted style="display:none"></video>

<script src="asset-data.js"></script>
<script>
const FRAME_CFG = [
  { src: 'A.png', side: 'right' },
  { src: 'B.png', side: 'right' },
  { src: 'C.png', side: 'left'  },
  { src: 'D.png', side: 'left'  },
];

const ASSETS = {
  bg: 'bg.gif',
  logo: 'logo.webp',
  resultGif: 'done.gif',
  pinkFrame: 'frame.jpg',
  roseFrame: 'frame2.jpg',
};

let cutouts   = [null,null,null,null];
let logoImgEl = null;
let pinkFrame = null;
let roseFrame = null;
let stream    = null;
let rafId     = null;
let curFrame  = 0;
let photos    = [];

const video     = document.getElementById('hiddenVideo');
const composite = document.getElementById('compositeCanvas');
const cCtx      = composite.getContext('2d');
const CW = 640, CH = 480;
const delay = ms => new Promise(r => setTimeout(r, ms));

// ── 사전 로드 ─────────────────────────────────────────────
(async () => {
  applyStaticAssets();
  [logoImgEl, pinkFrame, roseFrame] = await Promise.all([
    loadImgEl(ASSETS.logo).catch(()=>null),
    loadImgEl(ASSETS.pinkFrame).catch(()=>null),
    loadImgEl(ASSETS.roseFrame).catch(()=>null),
  ]);
  for (let i = 0; i < FRAME_CFG.length; i++) {
    cutouts[i] = await loadCanvas(FRAME_CFG[i].src).catch(e=>{console.warn(e);return null;});
  }
  // 로고 등장 시작
  triggerLogoEntrance();
})();

function assetCandidates(src) {
  const embedded = window.MEM4CUT_ASSET_DATA && window.MEM4CUT_ASSET_DATA[src];
  return [...new Set([
    embedded,
    src,
    src.normalize('NFD'),
    src.normalize('NFC'),
  ].filter(Boolean))];
}

function assetUrl(src) {
  return (window.MEM4CUT_ASSET_DATA && window.MEM4CUT_ASSET_DATA[src]) || src.normalize('NFD');
}

function applyStaticAssets() {
  document.body.style.backgroundImage = `url("${assetUrl(ASSETS.bg)}")`;
  document.getElementById('logoImg').src = assetUrl(ASSETS.logo);
  document.querySelector('#resultGif img').src = assetUrl(ASSETS.resultGif);
}

function loadImgEl(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const candidates = assetCandidates(src);
    let idx = 0;
    img.onload = () => resolve(img);
    img.onerror = () => {
      idx += 1;
      if (idx < candidates.length) img.src = candidates[idx];
      else reject(new Error(src + ' 로드 실패'));
    };
    img.src = candidates[idx];
  });
}
function loadCanvas(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth || img.width;
      c.height = img.naturalHeight || img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      resolve(c);
    };
    const candidates = assetCandidates(src);
    let idx = 0;
    img.onerror = () => {
      idx += 1;
      if (idx < candidates.length) img.src = candidates[idx];
      else reject(new Error(src + ' 로드 실패'));
    };
    img.src = candidates[idx];
  });
}

// ══ 로고 등장 애니메이션 + 효과음 ════════════════════════
function triggerLogoEntrance() {
  const logo = document.getElementById('logoImg');
  const glow = document.getElementById('logoGlow');

  // 효과음: Web Audio API로 뾰로롱~ 합성
  playMagicSound();

  // 애니메이션 클래스 부여
  logo.classList.add('enter');
  glow.classList.add('burst');

  // 등장 완료 후 pulse 루프로 전환
  logo.addEventListener('animationend', () => {
    logo.classList.remove('enter');
    logo.classList.add('pulse');
    logo.style.opacity = '1';
  }, { once: true });
}

function playMagicSound() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();

    // 뾰로롱: 상승하는 파스텔 톤들
    const notes = [
      { freq: 1047, t: 0.00, vol: 0.22 },  // C6
      { freq: 1175, t: 0.07, vol: 0.20 },  // D6
      { freq: 1319, t: 0.14, vol: 0.22 },  // E6
      { freq: 1568, t: 0.21, vol: 0.20 },  // G6
      { freq: 1760, t: 0.28, vol: 0.18 },  // A6
      { freq: 2093, t: 0.35, vol: 0.22 },  // C7 ← 화려한 마무리
      { freq: 2637, t: 0.40, vol: 0.16 },  // E7
    ];

    // 글로벌 reverb 느낌을 위한 컨볼버 (간단한 임펄스)
    const convolver = ac.createConvolver();
    const irLen = ac.sampleRate * 0.6;
    const irBuf = ac.createBuffer(2, irLen, ac.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = irBuf.getChannelData(ch);
      for (let i = 0; i < irLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1-(i/irLen), 2.5);
    }
    convolver.buffer = irBuf;

    const masterGain = ac.createGain();
    masterGain.gain.value = 0.6;
    convolver.connect(masterGain);
    masterGain.connect(ac.destination);

    notes.forEach(({ freq, t, vol }) => {
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(convolver);
      gain.connect(ac.destination); // dry signal도 조금

      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ac.currentTime + t);
      // 약간의 vibrato
      osc.frequency.linearRampToValueAtTime(freq * 1.012, ac.currentTime + t + 0.12);

      const start = ac.currentTime + t;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(vol, start + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.55);

      osc.start(start);
      osc.stop(start + 0.6);

      // 고조파(옥타브 위) 얇게 추가
      const osc2  = ac.createOscillator();
      const gain2 = ac.createGain();
      osc2.connect(gain2); gain2.connect(convolver);
      osc2.type = 'triangle';
      osc2.frequency.value = freq * 2;
      gain2.gain.setValueAtTime(0, start);
      gain2.gain.linearRampToValueAtTime(vol * 0.25, start + 0.02);
      gain2.gain.exponentialRampToValueAtTime(0.001, start + 0.3);
      osc2.start(start); osc2.stop(start + 0.35);
    });
  } catch (e) {
    console.warn('사운드 재생 실패:', e.message);
  }
}

// ══ 촬영 시작 ════════════════════════════════════════════
async function startShooting() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: {ideal:640}, height: {ideal:480} },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  } catch (err) {
    alert('카메라 오류: ' + err.message);
    return;
  }
  show('s-camera');
  startRAF();
  await autoShoot();
}

async function autoShoot() {
  for (let i = 0; i < 4; i++) {
    await countdown(3);
    await snapPhoto(i);
    if (i < 3) await delay(700);
  }
  await delay(400);
  stopRAF();
  stream.getTracks().forEach(t => t.stop());
  stream = null;
  generateStrip();
  show('s-result');

  // 스트립 등장 애니메이션
  const sc = document.getElementById('stripCanvas');
  sc.classList.remove('reveal');
  void sc.offsetWidth;
  sc.classList.add('reveal');

  // GIF 오버레이 등장
  const gifEl = document.getElementById('resultGif');
  gifEl.classList.remove('show');
  void gifEl.offsetWidth;
  gifEl.classList.add('show');
  gifEl.addEventListener('animationend', () => gifEl.classList.remove('show'), { once: true });

  // 파티클 폭죽
  launchSparkles();
}

// ── RAF ───────────────────────────────────────────────────
function startRAF() {
  const draw = () => {
    if (!stream) return;
    cCtx.save();
    cCtx.translate(CW,0); cCtx.scale(-1,1);
    cCtx.drawImage(video, 0, 0, CW, CH);
    cCtx.restore();
    drawPerson(curFrame);
    rafId = requestAnimationFrame(draw);
  };
  draw();
}
function stopRAF() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

function drawPerson(idx) {
  const cut = cutouts[idx];
  if (!cut) return;
  const ph = CH;
  const pw = ph * (cut.width / cut.height);
  const px = FRAME_CFG[idx].side === 'right' ? CW - pw : 0;
  cCtx.drawImage(cut, px, 0, pw, ph);
}

// ── 카운트다운 ────────────────────────────────────────────
async function countdown(n) {
  const el = document.getElementById('cdOverlay');
  for (let i = n; i > 0; i--) {
    el.textContent = i; el.classList.add('show');
    await delay(900);
    el.classList.remove('show'); await delay(100);
  }
  el.textContent = '📸'; el.classList.add('show');
  await delay(280);
  el.classList.remove('show');
}

async function snapPhoto(idx) {
  const snap = document.createElement('canvas');
  snap.width = CW; snap.height = CH;
  snap.getContext('2d').drawImage(composite, 0, 0);
  photos.push(snap);

  const th = document.getElementById('th' + idx);
  th.classList.add('taken');
  try {
    const img = document.createElement('img');
    img.src = snap.toDataURL('image/jpeg', 0.7);
    th.appendChild(img);
  } catch(e) { console.warn('썸네일 실패:', e.message); }

  flashScreen();
  document.getElementById('dot' + idx).classList.replace('active','done');
  curFrame = idx + 1;
  if (idx + 1 < 4) {
    document.getElementById('dot' + (idx+1)).classList.add('active');
    document.getElementById('cntBadge').textContent = (idx+2) + ' / 4';
  }
}

function flashScreen() {
  const f = document.createElement('div');
  f.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:9999;pointer-events:none;animation:flashFade .35s ease-out forwards;';
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 400);
}

// ── 스트립 생성 ───────────────────────────────────────────
function generateStrip() {
  const PW=280, PH=210, PAD=14, GAP=8, COL_GAP=14, HEADER=72, FOOTER=32;
  const colW   = PW + PAD*2;
  const totalW = PAD + colW + COL_GAP + colW + PAD;
  const totalH = PAD + HEADER + 4*(PH+GAP) - GAP + FOOTER + PAD;

  const sc = document.getElementById('stripCanvas');
  sc.width = totalW; sc.height = totalH;
  const ctx = sc.getContext('2d');

  if (roseFrame) {
    ctx.drawImage(roseFrame, 0, 0, totalW, totalH);
    ctx.fillStyle = 'rgba(0,0,0,0.32)';
    ctx.fillRect(0, 0, totalW, totalH);
  } else {
    ctx.fillStyle = '#1a0000';
    ctx.fillRect(0, 0, totalW, totalH);
  }

  for (const cx of [PAD, PAD+colW+COL_GAP]) {
    rRect(ctx, cx, PAD, colW, totalH-PAD*2, 10, 'rgba(10,0,5,0.5)');

    // 로고
    ctx.save();
    if (logoImgEl) {
      const lh = HEADER - 12;
      const lw = lh * (logoImgEl.naturalWidth / logoImgEl.naturalHeight);
      ctx.drawImage(logoImgEl, cx + PAD + (PW-lw)/2, PAD+6, lw, lh);
    }
    ctx.restore();

    ctx.strokeStyle = 'rgba(255,60,140,.4)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx+PAD, PAD+HEADER-4); ctx.lineTo(cx+colW-PAD, PAD+HEADER-4);
    ctx.stroke();

    const startY = PAD + HEADER;
    for (let i = 0; i < 4; i++) {
      const py = startY + i*(PH+GAP);
      if (photos[i]) {
        ctx.save();
        rRect(ctx, cx+PAD, py, PW, PH, 5);
        ctx.clip();
        ctx.drawImage(photos[i], cx+PAD, py, PW, PH);
        ctx.restore();
        // 핑크 프레임 오버레이
        if (pinkFrame) {
          ctx.save();
          ctx.globalCompositeOperation = 'screen';
          ctx.drawImage(pinkFrame, cx+PAD, py, PW, PH);
          ctx.restore();
        }
      }
    }

    const fy = PAD + HEADER + 4*(PH+GAP) - GAP + 8;
    ctx.save();
    ctx.fillStyle = 'rgba(255,160,200,.7)'; ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('꽃보다 남자', cx+PAD+PW/2, fy+18);
    ctx.restore();
  }
}

function rRect(ctx, x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  if (fill) { ctx.fillStyle=fill; ctx.fill(); } else ctx.clip();
}

// ── 파티클 ────────────────────────────────────────────────
const spCanvas = document.getElementById('sparkleCanvas');
const spCtx    = spCanvas.getContext('2d');
let   particles = [];
let   spRaf = null;

function resizeSparkle() { spCanvas.width = window.innerWidth; spCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeSparkle);
resizeSparkle();

function launchSparkles() {
  resizeSparkle();
  particles = [];
  const colors = ['#ff4da6','#ff80c0','#ffb3d9','#ff1a75','#ffffff','#ffdd00','#ff9933'];
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  const origins = [[cx,cy],[cx*0.3,cy*0.3],[cx*1.7,cy*0.3],[cx*0.3,cy*1.7],[cx*1.7,cy*1.7]];
  origins.forEach(([ox,oy]) => {
    for (let i = 0; i < 55; i++) {
      const angle = Math.random()*Math.PI*2;
      const speed = 2.5 + Math.random()*8;
      particles.push({
        x:ox, y:oy,
        vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - Math.random()*3,
        ay: 0.11,
        size: 3+Math.random()*6,
        color: colors[(Math.random()*colors.length)|0],
        alpha: 1, decay: 0.013+Math.random()*0.017,
        rotation: Math.random()*Math.PI*2, rotSpeed: (Math.random()-.5)*0.2,
        shape: Math.random()<0.5 ? 'circle' : 'star',
      });
    }
  });
  if (spRaf) cancelAnimationFrame(spRaf);
  animateSparkles();
  setTimeout(()=>{ if(spRaf) cancelAnimationFrame(spRaf); spCtx.clearRect(0,0,spCanvas.width,spCanvas.height); particles=[]; }, 3800);
}

function animateSparkles() {
  spCtx.clearRect(0,0,spCanvas.width,spCanvas.height);
  particles = particles.filter(p=>p.alpha>0.01);
  for (const p of particles) {
    p.vx*=0.99; p.vy+=p.ay; p.x+=p.vx; p.y+=p.vy;
    p.rotation+=p.rotSpeed; p.alpha-=p.decay;
    spCtx.save();
    spCtx.globalAlpha = Math.max(0,p.alpha);
    spCtx.translate(p.x,p.y); spCtx.rotate(p.rotation);
    spCtx.fillStyle = p.color;
    if (p.shape==='circle') {
      spCtx.beginPath(); spCtx.arc(0,0,p.size/2,0,Math.PI*2); spCtx.fill();
    } else {
      drawStar(spCtx,0,0,5,p.size/2,p.size/4); spCtx.fill();
    }
    spCtx.restore();
  }
  if (particles.length>0) spRaf = requestAnimationFrame(animateSparkles);
  else spCtx.clearRect(0,0,spCanvas.width,spCanvas.height);
}

function drawStar(ctx,cx,cy,spikes,or,ir) {
  let rot=(Math.PI/2)*3; const step=Math.PI/spikes;
  ctx.beginPath(); ctx.moveTo(cx,cy-or);
  for (let i=0;i<spikes;i++) {
    ctx.lineTo(cx+Math.cos(rot)*or,cy+Math.sin(rot)*or); rot+=step;
    ctx.lineTo(cx+Math.cos(rot)*ir,cy+Math.sin(rot)*ir); rot+=step;
  }
  ctx.lineTo(cx,cy-or); ctx.closePath();
}

// ── utils ─────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function downloadStrip() {
  const sc = document.getElementById('stripCanvas');
  if (!sc.width || !sc.height) {
    alert('저장할 이미지가 아직 없습니다.');
    return;
  }

  const fileName = '꽃보다남자_인생네컷.png';
  const blobPromise = canvasToBlob(sc);

  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: fileName,
        types: [{ description: 'PNG 이미지', accept: { 'image/png': ['.png'] } }],
      });
      const blob = await blobPromise;
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    } catch (err) {
      if (err && err.name === 'AbortError') {
        await blobPromise.catch(() => null);
        return;
      }
      console.warn('파일 저장 선택 실패:', err);
    }
  }

  let blob;
  try {
    blob = await blobPromise;
  } catch (err) {
    console.warn('PNG 생성 실패:', err);
    alert('이미지를 만드는 중 문제가 생겼습니다. 다시 촬영 후 저장해주세요.');
    return;
  }

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download = fileName;
  a.href = url;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  setTimeout(() => {
    const preview = window.open(url, '_blank');
    if (!preview) alert('다운로드가 시작되지 않으면 새로 열린 이미지에서 저장해주세요.');
  }, 120);
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

function canvasToBlob(canvas) {
  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => {
      if (blob) resolve(blob);
      else reject(new Error('캔버스 PNG 변환 실패'));
    }, 'image/png');
  });
}

function retake() {
  photos=[]; curFrame=0;
  ['th0','th1','th2','th3'].forEach(id=>{
    const el=document.getElementById(id); el.innerHTML=''; el.classList.remove('taken');
  });
  ['dot0','dot1','dot2','dot3'].forEach((id,i)=>{
    document.getElementById(id).className='frame-dot'+(i===0?' active':'');
  });
  document.getElementById('cntBadge').textContent='1 / 4';
  const sc=document.getElementById('stripCanvas');
  sc.classList.remove('reveal'); sc.style.opacity='0';
  if(spRaf){cancelAnimationFrame(spRaf);spRaf=null;}
  spCtx.clearRect(0,0,spCanvas.width,spCanvas.height);
  document.getElementById('resultGif').classList.remove('show');

  // 로고 다시 등장
  const logo=document.getElementById('logoImg');
  logo.classList.remove('pulse','enter');
  logo.style.opacity='0';
  const glow=document.getElementById('logoGlow');
  glow.classList.remove('burst');

  show('s-start');
  setTimeout(triggerLogoEntrance, 300);
}
